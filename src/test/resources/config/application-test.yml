server:
  port: 8081
  servlet:
    context-path: /XWorx
    jsp:
      init-parameters:
        development: true
  tomcat:
    uri-encoding: UTF-8
    threads.max: 1000
spring:
  config:
    import: application-common.properties,application-jpa.properties,application-jackson.properties,application-mvc.properties,application-flow.properties
  application:
    name: XMethod
  main:
    web-application-type: servlet #设置SpringBoot运行模式为SERVLET模式：阻塞同步Web模式
  banner:
    location: classpath:/banner/banner-test.txt
  thymeleaf:
    prefix: classpath:/thymeleaf/
    check-template-location: true
    suffix: .html
    encoding: UTF-8
    mode: HTML
    cache: false #设置页面缓存, 开发阶段最好设置为false
    view-names: thymeleaf/*,XWorx/thymeleaf/*
  mvc:
    view:
      prefix: /jsp/
      suffix: .jsp
  cloud:
    zookeeper:
      enabled: false
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/xworx
    username: xwadmin
    password: xwadmin
    hikari:
      connectionTimeout: 20000
      maximumPoolSize: 5
  jpa:
    show-sql: true #控制台打印SQL
    open-in-view: true
    properties:
      hibernate:
        dialect: com.flame.config.basic.XFlamePostgresDialect
        ddl-auto: create
        hbm2ddl:
          auto: update #none:启动时不做任何操作
        naming:
          physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss #设置RestController返回json的时间格式
    time-zone: GMT+8
    serialization:
      indent-output: true
    default-property-inclusion: NON_NULL #不对null进行序列化
  sql:
    init:
      platform: postgres
  web:
    resources:
      static-locations: classpath:/
flowable:
  deployment-mode: never-fail #关闭SpringAutoDeployment
  check-process-definitions: false
  database-schema-update: true
  db-history-used: true
  history-level: full
  process-definition-location-prefix: classpath:/templates/xflow/
  process-definition-location-suffixes: '**.bpmn'
logging:
  config: ${xworx.home}/codebase/config/logback/logback-test.xml
thingworx:
  enabled: false
  webapp: /Thingworx
  apphome: ${xworx.home}/thingworx
    