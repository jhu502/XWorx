<!DOCTYPE HTML>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head></head>
<body th:insert="~{thymeleaf/util/popup::default(section=~{::section}, script=~{::script}, callback='refreshFolderTree')}">
<section class="easyui-tabs" data-options="fit:true,border:false">
    <div th:title="#{attributes}" style="padding:8px 2px 2px 2px;">
        <div id="createEntityPropertyPanel" />
    </div>
</section>

<script type="text/javascript">
    flame.loadGrid('createEntityPropertyPanel', 'com.thing.mesher.form.CreateModelEntityPropertyForm', {
        queryParams: {
            'entityType': '[[${param.entityType}]]'
        }
    });

    function refreshFolderTree(result) {
        if (result.status == 'SUCCESS') {
            flame.reloadGrid('browserTable');
        }
        return true;
    }
</script>
</body>
</html>
