<!DOCTYPE HTML>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta content="text/html;charset=UTF-8"/>
	<meta name="viewport" http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>

	<meta content="text/html;charset=UTF-8"/>
	<link href="css/flame/easyui/easyui.css" th:href="@{/css/flame/easyui/easyui.css}" rel="stylesheet"/>
	<link href="css/flame/themes-icon.css" th:href="@{/css/flame/themes-icon.css}" rel="stylesheet"/>

	<script src="/javascript/easyui/jquery.min.js" th:src="@{/javascript/easyui/jquery.min.js}" type="text/javascript"></script>
	<script src="/javascript/easyui/jquery.easyui.min.js" th:src="@{/javascript/easyui/jquery.easyui.min.js}" type="text/javascript"></script>
	<script src="/javascript/flame/flame.thing.js" th:src="@{/javascript/flame/flame.thing.js}" type="text/javascript"></script>
	<script src="/javascript/flame/flame.xui.js" th:src="@{/javascript/flame/flame.xui.js}" type="text/javascript"></script>
</head>
<body>
<div class="easyui-layout" data-options="fit:true" style="font-family:Arial,Segoe UI,Tahoma;">
	<div data-options="region:'west',split:true,border:false" style="width: 250px;padding:1px;">
		<table id="GroupHierarchy" class="easyui-treegrid" style="height:400px"></table>
		<script type="text/javascript">
			flame.loadGrid("GroupHierarchy", "xw.auths.builder.PrincipalHierarchyTreeBuilder", {
				onClickRow: function (node) {
					$('#selectedOid').val(node.oid);
					$('#principalInfo').panel({
						href: "XUI$/info/InfoPage?oid=" + node.oid
					});
					$("#grouplist").datagrid('reload', {
						oid: node.oid
					});
					$("#userlist").datagrid('reload', {
						oid : node.oid
					});
				}
			});
		</script>
		<div id="GroupHierarchy_menu" class="easyui-menu" data-options="onClick:structHandler">
			<div id='menu_editStructItem'>Edit</div>
		</div>
	</div>
	<div data-options="region:'center',border:false">
		<input id="selectedOid" type="hidden" th:value="${T(xw.auths.OrganizationHelper).repository().getRootGroup()[0].getOid()}"/>
		<div id="principalInfo" class="easyui-panel" data-options="fit:true,border:false"></div>
	</div>
</div>
<script type="text/javascript">
	var rowOid;
	(($) => {
		const target = $('#selectedOid').val();
		$('#principalInfo').panel({
			href: 'XUI$/info/InfoPage?oid=' + target
		});
	})(jQuery);

	function structHandler(item) {
		var row = $('#orgStructTree').treegrid('getSelected');
		if (!isBlank(rowOid)) {
			if (rowOid.indexOf('XGroup') > 0) {
				popupWindow('Edit Group', 'thymeleaf/auths/editGroup.html?oid=' + rowOid, {}, 'width: 670px; height: 500px; padding: 5px;');
			} else if (rowOid.indexOf('XUser') > 0) {
				popupWindow('Edit User', 'thymeleaf/auths/editUser.html?oid=' + rowOid, {}, 'width: 670px; height: 500px; padding: 5px;');
			}
		}
	}
</script>
</body>
</html>
