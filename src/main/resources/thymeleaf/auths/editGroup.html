<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta content="text/html;charset=UTF-8"/>
	<link href="/css/flame/easyui/easyui.css" th:href="@{/css/flame/easyui/easyui.css}" rel="stylesheet"/>
	<link href="/css/flame/easyui/tabs.css" th:href="@{/css/flame/easyui/tabs.css}" rel="stylesheet"/>
	<link href="/css/flame/themes-icon.css" th:href="@{/css/flame/themes-icon.css}" rel="stylesheet"/>

	<script src="/javascript/easyui/jquery.min.js" th:src="@{/javascript/easyui/jquery.min.js}" type="text/javascript"></script>
	<script src="/javascript/easyui/jquery.easyui.min.js" th:src="@{/javascript/easyui/jquery.easyui.min.js}" type="text/javascript"></script>
	<script src="/javascript/flame/flame.thing.js" th:src="@{/javascript/flame/flame.thing.js}" type="text/javascript"></script>
	<script src="/javascript/flame/common.xui.js" th:src="@{/javascript/flame/common.xui.js}" type="text/javascript"></script>
	<script src="/javascript/flame/flame.xui.js" th:src="@{/javascript/flame/flame.xui.js}" type="text/javascript"></script>
</head>
<body>
	<form id="groupForm" method="post">
		<input id="groupOid" name="groupOid" hidden="true" th:value="${primaryObj.oid}">
		<br>
		<table style="align:center;font-size:12px">
			<tr style="height:30px">
				<td style="width:10px"></td>
				<td><input class="easyui-textbox" id="name" name="name" style="width:300px;height:25px" th:value="${primaryObj.name}" data-options="label:'组名称：',required:true"></td>
				<td style="width:10px"></td>
				<td><input class="easyui-textbox" id="englishName" name="englishName" style="width:300px;height:25px" th:value="${primaryObj.englishName}" data-options="label:'英文名称：',required:true"></td>
			</tr>
			<tr style="height:30px">
				<td style="width:10px"></td>
				<td colspan="3"><input class="easyui-textbox" id="fullName" name="fullName" style="width:100%;height:25px" th:value="${primaryObj.fullName}" data-options="label:'组全名：',required:true"></td>
			</tr>
			<tr style="height:30px">
				<td style="width:10px"></td>
				<td colspan="3">
					<select class="easyui-combobox" id="groupType" name="groupType" style="width:200px; height:25px" data-options="label:'组类型：',editable:false,panelHeight:'auto'">
						<option value="SYSTEM" th:selected="${primaryObj.groupType=='SYSTEM'}">系统</option>
						<option value="CORPORATION" th:selected="${primaryObj.groupType=='CORPORATION'}">总公司</option>
						<option value="COMPANY" th:selected="${primaryObj.groupType=='COMPANY'}">公司</option>
						<option value="DEPARTMENT" th:selected="${primaryObj.groupType=='DEPARTMENT'}">部门</option>
						<option value="OFFICE" th:selected="${primaryObj.groupType=='OFFICE'}">科室</option>
						<option value="GROUP" th:selected="${primaryObj.groupType=='GROUP'}">小组</option>
					</select>
				</td>
			</tr>
			<tr style="height:30px">
				<td style="width:10px"></td>
				<td colspan="3"><input class="easyui-textbox" id="description" name="description" style="width:100%;height:100px" th:value="${primaryObj.description}" data-options="label:'描述：',multiline:true"></td>
			</tr>
			<tr style="height:30px">
				<td style="width:10px"></td>
				<td colspan="3"><input class="easyui-textbox" id="tel" name="tel" style="width:300px;height:25px" th:value="${primaryObj.tel}" data-options="label:'电话：'"></td>
			</tr>
			<tr style="height:30px">
				<td style="width:10px"></td>
				<td colspan="3"><input class="easyui-textbox" id="fax" name="fax" style="width:300px;height:25px" th:value="${primaryObj.fax}" data-options="label:'传真：'"></td>
			</tr>
			<tr style="height:30px">
				<td style="width:10px"></td>
				<td colspan="3"><input class="easyui-textbox" id="address" name="address" style="width:100%;height:60px" th:value="${primaryObj.address}" data-options="label:'地址：',multiline:true"></td>
			</tr>
			<tr style="height:30px">
				<td style="width:10px"></td>
				<td><input class="easyui-textbox" name="email" style="width:300px;height:25px" th:value="${primaryObj.email}" data-options="label:'电子邮件：',validType:'email'"></td>
				<td style="width:10px"></td>
				<td><input class="easyui-textbox" name="postalCode" style="width:200px;height:25px" th:value="${primaryObj.postalCode}" data-options="label:'邮政编码：'"></td>
			</tr>
		</table>
	</form>
	<br>
	<br>
	<div style="text-align:right;padding:5px 0">
		<a href="javascript:void(0)" class="easyui-linkbutton" onclick="submitForm()" style="width:80px">Submit</a>
		<a href="javascript:void(0)" class="easyui-linkbutton" onclick="clearForm()" style="width:80px">Clear</a>
		<a href="javascript:void(0)" class="easyui-linkbutton" onclick="flame.closeWindow(this)" style="width:80px">Cancel</a>
	</div>
	<script type="text/javascript">
		function submitForm() {
			console.log($('#groupOid'));
			$('#groupForm').form('submit', {
				url : "/OrganiController/updateFTGroup?oid=" + $('#groupOid')[0].value,
				onSubmit : function() {
				},
				success : function(result) {
					if (result != '') {
						var json = jQuery.parseJSON(result);
						if (!isBlank(json.oid)) {
							$('#groupForm').form('clear');
							$('#editGroup').window('close');
							$.messager.alert('Success', 'Update Successfully.', 'info');
						} else {
							$.messager.alert('Error', result, 'error');
						}
					} else {
						$.messager.alert('Error', 'Update Failed', 'error');
					}
				}
			});
		}
		function clearForm() {
			$('#groupForm').form('clear');
		}
		function cancelForm() {
			$('#editGroup').window('close');
		}
	</script>
</body>
</html>
