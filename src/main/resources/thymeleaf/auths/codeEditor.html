<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<link href="/javascript/codemirror/lib/codemirror.css" th:href="@{/javascript/codemirror/lib/codemirror.css}" rel="stylesheet" />
<link href="/javascript/codemirror/theme/eclipse-ext.css" th:href="@{/javascript/codemirror/theme/eclipse-ext.css}" rel="stylesheet" />
<link href="/javascript/codemirror/addon/hint/show-hint.css" th:href="@{/javascript/codemirror/addon/hint/show-hint.css}" rel="stylesheet" />

<script src="/javascript/codemirror/lib/codemirror.js" th:src="@{/javascript/codemirror/lib/codemirror.js}" type="text/javascript"></script>
<script src="/javascript/codemirror/mode/javascript/javascript.js" th:src="@{/javascript/codemirror/mode/javascript/javascript.js}" type="text/javascript"></script>
<script src="/javascript/codemirror/addon/hint/show-hint.js" th:src="@{/javascript/codemirror/addon/hint/show-hint.js}" type="text/javascript"></script>
<script src="/javascript/codemirror/addon/hint/javascript-hint.js" th:src="@{/javascript/codemirror/addon/hint/javascript-hint.js}" type="text/javascript"></script>
<script src="/javascript/codemirror/addon/fold/foldcode.js" th:src="@{/javascript/codemirror/addon/fold/foldcode.js}" type="text/javascript"></script>
<script src="/javascript/codemirror/addon/fold/foldgutter.js" th:src="@{/javascript/codemirror/addon/fold/foldgutter.js}" type="text/javascript"></script>

<style type="text/css">
.CodeMirror {
	border: 1px solid black;
	font-family: console;
	font-size: 13;
}
</style>
</head>
<body>
	<textarea class="form-control" id="code" name="code"></textarea>
	<script type="text/javascript">
		CodeMirror.velocityContext = "server software env"; //瓊혤돕棍꼬，렘긱닒빈憩삿혤鑒앴
		CodeMirror.velocityCustomizedKeywords = "self";
		CodeMirror.commands.autocomplete = function(cm) {
			cm.showHint({
				hint : CodeMirror.hint.anyword
			});
		}
		var editor = CodeMirror.fromTextArea(document.getElementById("code"), {
			mode : {
				name : "javascript",
				globalVars : true
			},
			extraKeys : {
				"Ctrl-Q" : "autocomplete" //瓊刻덜쯤우쌥숩
			},
			lineNumbers : true,
			styleActiveLine : true,
			line : true,
			tabSize : 4,
			foldgutter : true,
			lineWrapping : true, //덜쯤粮딸
			//	hintOptions : {
			//		hint : handleShowHint,
			//		completeSingle : false
			//	},
			foldGutter : true,
			matchBrackets : true, //윅뵀튈토
			autoCloseBrackets : true
		});
		editor.setSize('800px', '950px');
	</script>

</body>
</html>
