<!DOCTYPE HTML>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<body th:insert="~{thymeleaf/util/popup::default(section=~{::section}, script=~{::script}, callback='refreshGroupTree')}">
    <section class="easyui-tabs" data-options="fit:true">
        <div title="Attributes" style="padding: 10px" id="newGroupAttributesPanel"></div>
    </section>

    <script type="text/javascript">
        flame.loadGrid('newGroupAttributesPanel', 'xw.auths.form.CreateGroupPropertyForm', {});

        function refreshGroupTree(result) {
            let json = JSON.parse(result);
            if (json.status == 'SUCCESS') {
                flame.reloadGrid('newGroupAttributesPanel');
            }
            return true;
        }
    </script>
</body>

</html>
