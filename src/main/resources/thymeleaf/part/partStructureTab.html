<!DOCTYPE HTML>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{thymeleaf/util/begin::easyUI(title='Struct')}"></head>
<body>
<div class="easyui-layout" data-options="fit:true">
    <div data-options="region:'north',border:false" style="height: 45px">
        <input id="focusPartOid" type="hidden" th:value="${commandBean.primaryOid}"/>
        <div id="PartStructureTabToolBar"></div>
        <script type="text/javascript" th:inline="text">
            flame.loadGrid("PartStructureTabToolBar", "plm.part.builder.PartToolBarBoxBuilder", {
                queryParams: {
                    oid: '[[${commandBean.primaryOid}]]',
                    toolbar: "XPart:PSB-ToolBar"
                }
            });
        </script>
    </div>
    <div data-options="region:'west',split:true,border:false" style="width: 400px;">
        <table id="product_struct_tree"></table>
        <script type="text/javascript" th:inline="text">
            flame.loadGrid("product_struct_tree", "plm.part.builder.ProductStructureTreeBuilder", {
                queryParams: {
                    oid: '[[${commandBean.primaryOid}]]'
                },
                onClickRow: function (node) {
                    $("#focusPartOid").val(node.rowId);
                    const structRightTab = document.querySelector('#structRightTab');
                    onSelectStructTab(structRightTab);
                }
            });
        </script>
    </div>
    <div data-options="region:'center',border:false">
		<x-tab-panel id="structRightTab" x-options="park:'fit'" o-select="onSelectStructTab(this);">
			<x-panel th:each="actionItem:${@ActionService.getSubActions('PSB-StructTabs','XPart')}" th:name="${actionItem.name}" 
				th:title="${actionItem.localDisplay}" th:x-options="|header:false,park:'fit',url:'${actionItem.url}'|">
			</x-panel>
		</x-tab-panel>
    </div>
</div>
<script type="text/javascript" th:inline="text">
    function onSelectStructTab(el) {
		const currPanel = el.getSelected();
		currPanel.setOption('params', {
			rowId: $('#focusPartOid').val()
		});
		currPanel.refresh();
    }
</script>
</body>
</html>
