<!DOCTYPE HTML>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <script src="javascript/flame/flame.view.js"></script>
</head>
<body th:insert="~{thymeleaf/util/popup::default(section=~{::section}, script=~{::script}, before='completeValidation', enctype='multipart/form-data')}">
<section class="easyui-layout" data-options="fit:true">
    <div data-options="region:'north',border:false" style="height: 45px; padding: 7px">
        <input class="easyui-filebox" name="thumbnail3dFile" id="thumbnail3dFile" data-options="prompt:'Choose a Thumbnail 3d File...'" style="width: 100%">
    </div>
    <div data-options="region:'center',border:false">
        <div id="CreoViewWebGLDiv" style="width: 100%; height: 99%; border: 1px solid #DCDCDC; float: left"></div>
    </div>
</section>
<script type="text/javascript">
    (($) => {
        const xworxview = new flame.view.Thingview('javascript/thingview', "CreoViewWebGLDiv");
        xworxview.initializeThingView();
        $('#thumbnail3dFile').filebox({
            onChange: function () {
                "use strict";
                const file = $('#thumbnail3dFile').filebox('files')[0];
                if (!file.name.endWith('.ol')) {
                    alert('请选择正确的Thumbnail 3D文件.');
                    return;
                }
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = function (e) {
                    xworxview.unloadAll3dModel();
                    console.log(e.target.result);
                    xworxview.load3dModelNode(e.target.result);
                }
            }
        });
    })(jQuery);

    function completeValidation() {
        return true;
    }
</script>
</body>
</html>
