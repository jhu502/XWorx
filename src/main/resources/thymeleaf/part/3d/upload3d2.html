<!DOCTYPE HTML>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <script src="javascript/flame/flame.view.js"></script>
</head>
<body th:insert="~{thymeleaf/util/popup::default(section=~{::div}, script=~{::script}, before='completeValidation', enctype='multipart/form-data')}">
<div class="easyui-layout" data-options="fit:true">
    <div data-options="region:'north',border:false" style="height: 45px; padding: 7px">
        <input class="easyui-filebox" name="thumbnail3dFile" id="thumbnail3dFile"
               data-options="prompt:'Choose a Thumbnail 3d File...'" style="width: 100%">
    </div>
    <div data-options="region:'center',border:false">
        <div id="CreoViewWebGLDiv" style="width: 100%; height: 100%; border: 1px solid #DCDCDC; float: left"></div>
    </div>
</div>
<script type="text/javascript">
    const xworxview = new flame.view.Thingview('javascript/thingview', "CreoViewWebGLDiv");
    xworxview.initializeThingView().then(() => {
        xworxview.load3dModelNode("thingview/golf_cart/wheel_axle.ol");
    }, () => {
        reject();
    });

    (($) => {
        $('#thumbnail3dFile').filebox({
            onChange: function () {
                const fileList = $('#thumbnail3dFile').filebox('files')[0];
                console.log(fileList);
            }
        });
    })(jQuery);

    function completeValidation() {
        return true;
    }
</script>
</body>
</html>
