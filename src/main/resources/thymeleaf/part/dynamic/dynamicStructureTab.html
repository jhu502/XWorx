<!DOCTYPE HTML>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{thymeleaf/util/begin::easyUI(title='Dynamics')}">
</head>
<body>
	<div class="easyui-layout" data-options="fit:true">
		<div data-options="region:'north',border:false" style="height: 45px">
			<input id="configPartOid" type="hidden" th:value="${commandBean.primaryOid}" />
			<div id="PartDynamicTabToolBar"></div>
			<script type="text/javascript" th:inline="text">
				flame.loadGrid("PartDynamicTabToolBar", "plm.part.builder.PartToolBarBoxBuilder", {
					queryParams: {
						oid: '[[${commandBean.primaryOid}]]',
						toolbar: "XDynamic:CSB-ToolBar"
					}
				});
			</script>
		</div>
		<div data-options="region:'west',split:true,border:false" style="width: 400px;">
			<table id="variant_struct_tree"></table>
			<script type="text/javascript" th:inline="text">
				flame.loadGrid("variant_struct_tree", "plm.dynamic.builder.ConfigStructureTreeBuilder", {
					queryParams : {
						oid : '[[${commandBean.primaryOid}]]'
					},
					onClickRow : function(node) {
						$("#configPartOid").val(node.rowId);
                    	const dynamicRightTab = document.querySelector('#dynamicRightTab');
                    	onSelectDynamicTab(dynamicRightTab);
					}
				});
			</script>
		</div>
		<div data-options="region:'center',border:false">
			<x-tab-panel id="dynamicRightTab" x-options="park:'fit'" o-select="onSelectDynamicTab(this, true);">
				<x-panel th:each="actionItem:${@ActionService.getSubActions('PSB-ConfigTabs','XPart')}" th:name="${actionItem.name}" 
					th:title="${actionItem.localDisplay}" th:x-options="|header:false,park:'fit',url:'${actionItem.url}'|">
				</x-panel>
			</x-tab-panel>
		</div>
	</div>
	<script type="text/javascript" th:inline="text">
		function onSelectDynamicTab(el) {
			const currPanel = el.getSelected();
			if (!currPanel) return;
			currPanel.setOption('params', {
				rowId: $('#configPartOid').val()
			});
		}

		function toolButtonOnClick(winType, key, title, style, script) {
			switch (winType) {
			case 'popup':
				flame.actionWindow(key, title, style);
				break;
			case 'invoke':
				break;
			case 'script':
				flame.runScript(script, );
				break;
			}
		}
	</script>
</body>
</html>
