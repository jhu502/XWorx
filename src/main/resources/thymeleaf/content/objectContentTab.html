<!DOCTYPE HTML>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<style>
	.content-wrap { display: flex; height: 100%; }
	.content-left { width: 280px; min-width: 200px; border-right: 1px solid #ddd; display: flex; flex-direction: column; background: #ebfdff; }
	.content-left-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
	.content-left-section:last-child { flex: 2; }
	.content-left-section + .content-left-section { border-top: 2px solid #bbb; }
	.section-header { padding: 6px 10px; font-weight: bold; font-size: 12px; border-bottom: 1px solid #ddd; background: #abfbfb; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; }
	.content-left-header { padding: 2px 10px; font-weight: bold; font-size: 13px; border-bottom: 1px solid #ddd; background: #abfbfb; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; }
	.content-left-header .upload-btn { cursor: pointer; color: #666; font-size: 15px; padding: 0px 4px; border-radius: 3px; transition: color 0.2s, background 0.2s; }
	.content-left-header .upload-btn:hover { color: #1a73e8; background: #dce8fa; }
	.content-left-list { overflow-y: auto; flex: 1; }
	.content-list-item { display: flex; align-items: center; padding: 7px 10px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 12px; transition: background 0.15s; }
	.content-list-item:hover { background: #e3f0ff; }
	.content-list-item.active { background: #cce4ff; }
	.content-list-item .ct-icon { margin-right: 6px; font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }
	.content-list-item .ct-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
	.content-list-item .ct-type { font-size: 10px; color: #999; margin-left: 4px; flex-shrink: 0; }
	.content-right { flex: 1; position: relative; overflow: hidden; }
	.content-right .viewer-pane { position: absolute; inset: 0; display: none; }
	.content-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: #abfbfb; font-size: 14px; }
	.content-empty i { margin-right: 6px; }
	#genericViewer { padding: 24px; overflow-y: auto; }
	#genericViewer table td { padding: 4px 8px; font-size: 13px; }
	#genericViewer table td:first-child { color: #888; text-align: right; }
	.upload-dialog { padding: 20px; }
	.upload-dialog .field { margin-bottom: 14px; }
	.upload-dialog .field label { display: block; margin-bottom: 4px; font-size: 13px; color: #555; }
	.upload-dialog .field input[type=file] { width: 100%; padding: 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
	.upload-dialog .field select { width: 100%; padding: 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
	.upload-dialog .actions { display: flex; align-items: center; margin-top: 18px; }
	.upload-dialog .actions .msg { flex: 1; margin-top: 0; }
	.upload-dialog .actions button { padding: 6px 18px; border: 1px solid #ccc; border-radius: 3px; cursor: pointer; font-size: 13px; margin-left: 8px; }
	.upload-dialog .actions .btn-upload { background: #1a73e8; color: #fff; border-color: #1a73e8; }
	.upload-dialog .actions .btn-upload:hover { background: #1557b0; }
	.upload-dialog .actions .btn-cancel { background: #f5f5f5; }
	.upload-dialog .actions .btn-cancel:hover { background: #e5e5e5; }
	.upload-dialog .msg { margin-top: 10px; font-size: 12px; }
	.upload-dialog .msg.error { color: #d32f2f; }
	.upload-dialog .msg.success { color: #2e7d32; }
</style>
<body>
	<div class="content-wrap" th:with="allContentItems=${T(xw.content.XContentHelper).getAllContentItems(commandBean.primaryObj)}">
		<!-- Left Panel: Content List -->
		<div class="content-left">
			<!-- Upper: Application Data -->
			<div class="content-left-section">
				<div class="content-left-header">
					<span>Content (<span th:text="${allContentItems==null?0:allContentItems.size()}">0</span>)</span>
					<svg class="upload-btn" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="24" height="24" fill="currentColor" onclick="openUploadDialog(event)"><path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/><path d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708l3-3z"/></svg>
				</div>
				<div class="content-left-list">
					<div th:if="${allContentItems==null || allContentItems.isEmpty()}" class="content-empty" style="font-size:12px;">No content items</div>
					<div th:each="item,iterStat : ${allContentItems}" class="content-list-item"
						 th:data-oid="${item.oid}"
						 th:data-filename="${item.fileName}"
						 th:data-contenttype="${item.contentType}"
						 th:data-filesize="${item.fileSize}"
						 th:onclick="selectContentItem(this)">
						<svg class="ct-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="14" height="14" fill="#999"><path d="M4 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V4.414a1.5 1.5 0 0 0-.44-1.06l-2.413-2.414A1.5 1.5 0 0 0 10.086.5L10 .5H4zM4 1h5.5v3a1 1 0 0 0 1 1H14v9H4V1z"/></svg>
						<span class="ct-name" th:text="${item.fileName}" th:title="${item.fileName}"></span>
						<span class="ct-type" th:text="${item.contentType.display}"></span>
					</div>
				</div>
			</div>
			<!-- Lower: Resource Data -->
			<div class="content-left-section" th:with="resourceItems=${T(xw.content.XContentHelper).getAllResourceItems(commandBean.primaryObj)}">
				<div class="section-header">
					<span>Resources (<span th:text="${resourceItems==null?0:resourceItems.size()}">0</span>)</span>
				</div>
				<div class="content-left-list">
					<div th:if="${resourceItems==null || resourceItems.isEmpty()}" class="content-empty" style="font-size:12px;">No resource items</div>
					<div th:each="item : ${resourceItems}" class="content-list-item"
						 th:data-filename="${item.fileName}"
						 th:data-uploadedpath="${item.uploadedPath}"
						 th:onclick="selectResourceItem(this)">
						<svg class="ct-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="14" height="14" fill="#999"><path d="M4 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V4.414a1.5 1.5 0 0 0-.44-1.06l-2.413-2.414A1.5 1.5 0 0 0 10.086.5L10 .5H4zM4 1h5.5v3a1 1 0 0 0 1 1H14v9H4V1z"/></svg>
						<span class="ct-name" th:text="${item.uploadedPath}" th:title="${item.uploadedPath}"></span>
						<span class="ct-type" style="font-size:10px;color:#999;">res</span>
					</div>
				</div>
			</div>
		</div>

		<!-- Right Panel: Content Viewer -->
		<div class="content-right">
			<!-- Empty state -->
			<div id="emptyState" class="content-empty" style="position:absolute;inset:0;display:flex;">
				<img th:src="@{/images/thing/markdown.png}" alt="" style="position:absolute;inset:0;max-width:100%;max-height:100%;object-fit:contain;margin:auto;" />
			</div>
			<!-- Markdown viewer -->
			<div id="markdownViewer" class="viewer-pane">
				<x-markdown id="xMarkdown" x-options="mode:'preview',autoLoad:false,readOnly:false,lineNumbers:true,resPrefix:'XUI$/downloadResource/',saveUrl:'XUI$/form/xw.content.processor.SaveMarkdownProcessor'"></x-markdown>
			</div>
			<!-- Image viewer -->
			<div id="imageViewer" class="viewer-pane" style="display:none;align-items:center;justify-content:center;background:#f0f0f0;overflow:auto;">
				<img id="imageView" alt="" style="max-width:100%;max-height:100%;object-fit:contain;" />
			</div>
			<!-- PDF viewer -->
			<div id="pdfViewer" class="viewer-pane">
				<iframe id="pdfFrame" style="width:100%;height:100%;border:none;"></iframe>
			</div>
			<!-- 3D Model viewer (ThingView for .ol files) -->
			<div id="thingViewer" class="viewer-pane" style="background:#2b2b2b;">
				<div id="thumbnailDisplay" style="width:100%;height:100%;"></div>
			</div>
			<!-- Generic viewer (other file types) -->
			<div id="genericViewer" class="viewer-pane">
				<table>
					<tr><td>File Name:</td><td><strong id="genFileName"></strong></td></tr>
					<tr><td>File Size:</td><td id="genFileSize"></td></tr>
					<tr><td>Content Type:</td><td id="genContentType"></td></tr>
				</table>
				<a id="genDownloadLink" href="#" target="_blank" class="easyui-linkbutton" style="margin-top:12px;">
					<i class="fa fa-download"></i> Download
				</a>
			</div>
		</div>
	</div>
	<script type="text/javascript" th:src="@{/javascript/antv/x6.min.js}"></script>
	<script type="text/javascript" th:src="@{/javascript/flame/sysml.xui.js}"></script>
	<script type="text/javascript" th:src="@{/javascript/flame/flame.view.js}"></script>
	<script type="text/javascript" th:src="@{/javascript/flame/marked.xui.js}"></script>
	<script type="text/javascript">
		var thingViewInstance = null;

		function loadThingView(oid) {
			const viewerEl = document.getElementById('thumbnailDisplay');
			if (!viewerEl) return;

			if (!thingViewInstance) {
				thingViewInstance = new flame.view.Thingview('javascript/thingview', 'thumbnailDisplay');
			}

			thingViewInstance.initializeThingView().then(function () {
				thingViewInstance.unloadAll3dModel();
				thingViewInstance.load3dModelNode('XUI$/downloadContent?oid=' + encodeURIComponent(oid));
			}, function () {
				console.error('[Thingview] Failed to initialize ThingView');
			});
		}

		function selectContentItem(el) {
			const items = el.parentElement.querySelectorAll('.content-list-item');
			for (let i = 0; i < items.length; i++) {
				items[i].classList.remove('active');
			}
			el.classList.add('active');

			const oid = el.getAttribute('data-oid');
			const fileName = el.getAttribute('data-filename') || '';
			const fileSize = el.getAttribute('data-filesize');
			const contentType = el.getAttribute('data-contenttype');

			if (!oid)
				return;

			const downloadUrl = 'XUI$/downloadContent?oid=' + encodeURIComponent(oid);
			const ext = (fileName.toLowerCase().split('.').pop() || '');

			hideAllViewers();

			if (ext === 'md') {
				document.getElementById('markdownViewer').style.display = 'block';
				const xMarkdown = document.getElementById('xMarkdown');
				if (xMarkdown && xMarkdown.loadFromURL) {
					xMarkdown.options.saveUrl = 'XUI$/form/xw.content.processor.SaveMarkdownProcessor?oid=' + encodeURIComponent(oid);
					xMarkdown.loadFromURL(downloadUrl);
				}
			} else if (ext === 'pdf') {
				document.getElementById('pdfViewer').style.display = 'block';
				document.getElementById('pdfFrame').src = downloadUrl + '&inline=true';
			} else if (ext === 'ol') {
				document.getElementById('thingViewer').style.display = 'block';
				loadThingView(oid);
			} else {
				document.getElementById('genericViewer').style.display = 'block';
				document.getElementById('genFileName').textContent = fileName;
				document.getElementById('genFileSize').textContent = formatFileSize(parseInt(fileSize) || 0);
				document.getElementById('genContentType').textContent = contentType;
				document.getElementById('genDownloadLink').href = downloadUrl;
			}
		}

		function selectResourceItem(el) {
			const items = el.parentElement.querySelectorAll('.content-list-item');
			for (let i = 0; i < items.length; i++) {
				items[i].classList.remove('active');
			}
			el.classList.add('active');

			const fileName = el.getAttribute('data-filename') || '';
			const uploadedPath = el.getAttribute('data-uploadedpath') || '';
			const holderOid = '[[${commandBean.primaryOid}]]';
			const downloadUrl = 'XUI$/downloadResource/' + uploadedPath + '?oid=' + encodeURIComponent(holderOid);
			const ext = (fileName.toLowerCase().split('.').pop() || '');

			hideAllViewers();

			if (['png','jpg','jpeg','gif','svg','bmp','webp','ico'].includes(ext)) {
				document.getElementById('imageViewer').style.display = 'flex';
				document.getElementById('imageView').src = downloadUrl;
				document.getElementById('imageView').alt = fileName;
			} else {
				document.getElementById('genericViewer').style.display = 'block';
				document.getElementById('genFileName').textContent = fileName;
				document.getElementById('genContentType').textContent = 'Resource';
				document.getElementById('genDownloadLink').href = downloadUrl;
			}
		}

		function hideAllViewers() {
			const panes = document.querySelectorAll('.viewer-pane');
			for (let i = 0; i < panes.length; i++) {
				panes[i].style.display = 'none';
			}
		}

		function formatFileSize(bytes) {
			if (!bytes || bytes === 0)
				return '0 B';
			const units = ['B', 'KB', 'MB', 'GB'];
			let i = Math.floor(Math.log(bytes) / Math.log(1024));
			if (i >= units.length) {
				i = units.length - 1;
			}
			return (bytes / Math.pow(1024, i)).toFixed(1) + ' ' + units[i];
		}

		function openUploadDialog(event) {
			const existing = document.getElementById('uploadContentWindow');
			if (existing) {
				existing.close();
				existing.remove();
			}

			const holderOid = '[[${commandBean.primaryOid}]]';
			const uploadWin = document.createElement('x-window');
			uploadWin.id = 'uploadContentWindow';
			uploadWin.title = 'Upload Content';
			uploadWin.setAttribute('x-options', "minimize:false,maximize:false,resize:false,destroy:true");
			uploadWin.style.cssText = 'width:460px;height:250px';
			uploadWin.content(
				`<div class="upload-dialog">
					<div class="field">
						<label>Select File:</label>
						<input type="file" id="uploadFileInput" style="width:100%;padding:6px;border:1px solid #ddd;border-radius:4px;font-size:13px;"/>
					</div>
					<div class="field">
						<label>Content Type:</label>
						<select id="uploadContentType" style="width:100%;height:32px;padding:6px;border:1px solid #ddd;border-radius:4px;font-size:13px;">
							<option value="PRIMARY">Primary</option>
							<option value="SECONDARY">Secondary</option>
							<option value="THUMBNAIL3D">Thumbnail 3D</option>
							<option value="RESOURCE">Resource</option>
						</select>
					</div>
					<div class="actions">
						<div class="msg" id="uploadMsg"></div>
						<button class="btn-cancel" onclick="this.closest('x-window').close()">Cancel</button>
						<button class="btn-upload" onclick="this.closest('x-window').getData().upload(this.closest('x-window'))">Upload</button>
					</div>
				</div>`, {
					holderOid: holderOid,
					upload: function (win) {
						const fileInput = win.querySelector('#uploadFileInput');
						const contentType = win.querySelector('#uploadContentType').value;
						const msgEl = win.querySelector('#uploadMsg');
						const file = fileInput.files[0];

						if (!file) {
							msgEl.textContent = 'Please select a file.';
							msgEl.className = 'msg error';
							return;
						}

						const formData = new FormData();
						formData.append('file', file);
						formData.append('oid', this.holderOid);
						formData.append('contentType', contentType);

						msgEl.textContent = 'Uploading...';
						msgEl.className = 'msg';

						const self = this;
						axios.post('XUI$/form/xw.content.processor.UploadContentProcessor', formData, {
							headers: { 'Content-Type': 'multipart/form-data' }
						}).then(function (response) {
							msgEl.textContent = 'Uploaded successfully.';
							msgEl.className = 'msg success';
							setTimeout(function () {
								win.close();
								location.reload();
							}, 800);
						}).catch(function (error) {
							msgEl.textContent = 'Upload failed: ' + (error.message || 'Unknown error');
							msgEl.className = 'msg error';
							console.error(error);
						});
					}
				}
			);

			uploadWin.open(null, null, { x: event.clientX + 10, y: event.clientY });
		}

	</script>
</body>
</html>
