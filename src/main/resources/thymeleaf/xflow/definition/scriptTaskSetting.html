<!DOCTYPE HTML>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
</head>
<body th:insert="~{thymeleaf/util/popup::basic(section=~{::section}, style=~{::style}, link=~{::link}, script=~{::script}, before='saveXFlowNodeData')}">
<link href="javascript/codemirror/lib/codemirror.css" rel="stylesheet"/>
<link href="javascript/codemirror/theme/eclipse-ext.css" rel="stylesheet"/>
<link href="javascript/codemirror/addon/hint/show-hint.css" rel="stylesheet"/>
<script src="javascript/codemirror/lib/codemirror.js" type="text/javascript"></script>
<script src="javascript/codemirror/mode/groovy/groovy.js" type="text/javascript"></script>
<script src="javascript/codemirror/addon/hint/show-hint.js" type="text/javascript"></script>
<script src="javascript/codemirror/addon/fold/foldcode.js" type="text/javascript"></script>
<script src="javascript/codemirror/addon/fold/foldgutter.js" type="text/javascript"></script>
<style>
    .CodeMirror {
        border: 1px solid #eee;
        height: 269px !important;
    }
    .CodeMirror-scroll {
        min-height: 100px;
        height: 269px !important;
    }
</style>
<section class="easyui-tabs" data-options="fit:true,onSelect:onSelectActivityTab">
    <input id="nodeId" type="hidden" th:value="${commandBean.getTextParameter('nodeId')}">
    <div th:title="#{attributes}" style="padding:10px">
        <table>
            <tr>
                <td style="width:70px;text-align:right;padding-right:5px"><strong th:text="#{label_name}"></strong></td>
                <td style="padding-top:3px;"><input id="nodeLabel" name="nodeLabel" style="width:250px;height:25px"></input></td>
            </tr>
            <tr>
                <td style="width:70px;text-align:right;vertical-align:top;padding-right:5px;"><strong th:text="#{label_instructions}"></strong></td>
                <td style="padding-top:3px;"><textarea id="instructions" name="instructions" rows="4" cols="90"></textarea></td>
            </tr>
        </table>
    </div>
    <div th:title="#{script}" style="padding:2px">
        <div class="easyui-layout" data-options="fit:true">
            <div data-options="region:'west',border:false" style="width:120px;">
                <div class="easyui-datalist" id="routeEventsGrid" th:title="#{routing}"
                     data-options="fit:true,checkbox:true,selectOnCheck:true,valueField:'value',textField:'value',tools:'#routeTbar'">
                    <thead>
                    <tr>
                        <th data-options="field:'type',hidden:true"></th>
                        <th data-options="field:'value',editor:{type:'text'}"></th>
                        <th data-options="field:'expression',hidden:true"></th>
                    </tr>
                    </thead>
                </div>
            </div>
            <div data-options="region:'center',border:false" style="padding-left:5px;">
                <div class="easyui-layout" data-options="fit:true">
                    <div data-options="region:'north',border:true" style="padding:2px 0px 1px 10px;height:26px;">
                        <label style="color:#009ae7;margin-right:300px" th:text="#{expression}"></label>
                        <button type="button" style="width:120px;height:20px;" onclick="alert();" th:text="#{check_syntax}"></button>
                    </div>
                    <div data-options="region:'center',border:false">
                        <textarea id="expression" name="expression"></textarea>
                    </div>
                </div>
            </div>
            <div id="routeTbar">
                <a href="javascript:void(0)" class="icon-add" onclick="javascript:addRouteRow()"></a>
                <a href="javascript:void(0)" class="icon-edit" onclick="javascript:alert('ok')"></a>
                <a href="javascript:void(0)" class="icon-delete" onclick="javascript:delRouteRow()"></a>
            </div>
        </div>
    </div>
</section>
<script type="text/javascript" th:inline="text">
    var editor = null;
    var girdRouteEvents = [];
    (($) => {
        const nodeId = $('#nodeId').val();
        const node = flowEditor.getXFlowNode(nodeId);
        const flowData = node.store.data;
        $('#nodeLabel').val(flowData.label);
        $('#expression').val(flowData.expression);
        $('#instructions').val(flowData.instructions);

        if (flowData.routevents) {
            for (let i = 0; i < flowData.routevents.length; i++) {
                const routeEvent = flowData.routevents[i];
                if (routeEvent) {
                    girdRouteEvents.push({
                        type: routeEvent.type,
                        value: routeEvent.value,
                        expression: routeEvent.expression
                    })
                }
            }
        }
    })(jQuery);

    function onSelectActivityTab(o, p) {
        const nodeId = $('#nodeId').val();
        const node = flowEditor.getXFlowNode(nodeId);
        const flowData = node.store.data;
        if (p == 1) {
            if (!editor) {
                CodeMirror.velocityContext = 'server software env'; //提取到外部，方便从后台获取数据
                CodeMirror.velocityCustomizedKeywords = "self pbo";
                CodeMirror.commands.autocomplete = function (cm) {
                    cm.showHint({
                        hint: CodeMirror.hint.anyword
                    });
                }
                editor = CodeMirror.fromTextArea(document.getElementById('expression'), {
                    mode: "text/x-groovy",
                    lineNumbers: true,      // 显示行数
                    indentUnit: 4,          // 缩进单位为 4
                    styleActiveLine: true,  // 当前行背景高亮
                    lineWrapping: true,     // 代码折叠
                    line: true,
                    tabSize: 4,
                    readOnly: false,
                    foldGutter: true,
                    matchBrackets: true,    //括号匹配
                    autoCloseBrackets: true,
                    extraKeys: {'Ctrl-Q': 'autocomplete'}   // 提示代码快捷键
                });
            }

            if (!flowData.routevents) {
                flowData.routevents = [];
            }
            $('#routeEventsGrid').datalist('loadData', girdRouteEvents);
        }
    }

    function addRouteRow() {
        $.messager.prompt('[[#{input_routing}]]', '[[#{label_routing_name}]]', function (route) {
            if (route) {
                $('#routeEventsGrid').datalist('insertRow', {
                    row: {
                        type: 'route',
                        value: route,
                        expression: ''
                    }
                });
            }
        });
    }

    function delRouteRow() {
        const selected = $('#routeEventsGrid').datalist('getSelections');
        for (let i = 0; i < selected.length; i++) {
            if (selected[i].type == 'route') {
                const index = $('#routeEventsGrid').datalist('getRowIndex', selected[i]);
                $('#routeEventsGrid').datalist('selectRow', index).datalist('endEdit', index);
                //删除行
                $('#routeEventsGrid').datalist('deleteRow', index);
            }
        }
        $('#routeEventsGrid').datalist('clearSelections');
    }

    function saveXFlowNodeData(o) {
        const nodeId = $('#nodeId').val();
        const node = flowEditor.getXFlowNode(nodeId);
        const flowData = node.store.data;
        if (node) {
            const nodeLabel = $('#nodeLabel').val();
            const expression = $('#expression').val();
            const instructions = $('#instructions').val();
            if (isBlank(expression)) {
                alert('[[#{please_set_express_script}]]');
                return false;
            }
            flowData.label = nodeLabel;
            flowData.instructions = instructions;
            flowData.routevents = girdRouteEvents;
            if (editor)
                flowData.expression = editor.getValue();
            flowEditor.modifyNodeLabel(nodeId, nodeLabel);
        }
        flame.closeWindow(o);
    }
</script>
</body>
</html>
