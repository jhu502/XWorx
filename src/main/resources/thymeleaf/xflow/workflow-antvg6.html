<!DOCTYPE HTML>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{thymeleaf/util/begin::basic('Workflow', ~{}, ~{::script})}">
    <script src="javascript/axios/axios.min.js" th:href="@{/javascript/axios/axios.min.js}" type="text/javascript"></script>
    <script src="javascript/antv/g6.min.js" th:href="@{/javascript/antv/g6.min.js}" type="text/javascript"></script>
</head>
<body>
<div id="container" style="height:98vh"></div>
<script type="text/javascript">
    var data = {
        nodes: [
            {
                id: 'start',
                img: 'images/flow/startproc.gif',
                x: 40,
                y: 40,
                width: 18,
                height: 18,
                label: '开始'
            },
            {
                id: 'activity',
                img: 'images/flow/activity.gif',
                x: 160,
                y: 40,
                width: 18,
                height: 18,
                label: '活动'
            },
            {
                id: 'activity0',
                img: 'images/flow/activity.gif',
                x: 260,
                y: 40,
                width: 18,
                height: 18,
                label: '活动0'
            },
            {
                id: 'end',
                img: 'images/flow/endproc.gif',
                x: 160,
                y: 180,
                width: 18,
                height: 18,
                label: 'end'
            }
        ],
        edges: [
            {
                source: 'start',
                target: 'activity',
                label: '通过'
            },
            {
                source: 'activity',
                target: 'end'
            },
        ],
    };
    window.onload = function () {
        const graph = new G6.Graph({
            container: 'container',
            width: 800,
            height: 600,
            modes: {
                default: ['drag-node', 'click-select', 'activate-relations', 'drag-add-edge'], //允许拖拽节点; drag-canvas:拖拽画布, zoom-canvas:放缩画布, activate-relations:设置高亮
            },
            layout: {
                preventOverlap: true, //防止节点重叠
                nodeSize: 50, //防碰撞必须设置nodeSize或size,否则不生效
            },
            defaultNode: { //节点样式修改
                type: 'image', //设置节点为图片
                size: [18, 18], //节点大小
                labelCfg: { //修改节点label样式
                    style: {
                        fill: 'black', //字体颜色
                        fontSize: 12 //字体大小
                    }
                }
            },
            defaultEdge: {
                style: {
                    opacity: 1, //边透明度
                    lineWidth: 1, //线宽
                    stroke: 'black', //线的颜色
                    endArrow: { //设置终点箭头
                        path: G6.Arrow.vee(7, 9, 1), //使用内置箭头路径函数，参数为箭头:宽度、长度、偏移量（默认为 0，与 d 对应）
                        d: 1
                    }
                }
            }
        });
        graph.data(data);
        graph.render();
        graph.on('node:click', (e) => {
            const node = e.item;
            console.log('Node单击', e)
        });
        graph.on('node:dblclick', (e) => {
            const node = e.item //获取被点击的节点元素对象
            console.log('Node双击', e)
        });
        graph.on('node:mouseenter', (e) => {
            const node = e.item;
            graph.setAutoPaint(false);
            //graph.setItemState(node, 'selected', true);
            graph.paint();
            graph.setAutoPaint(true);
        });
        graph.on('canvas:click', (e) => {
            console.log('Canvas单击', e)
        });
        graph.on('edge:click', (e) => {
            const edge = e.item; //被点击的边元素
            const shape = e.target; //被点击的图形，可根据该信息作出不同响应，以达到局部响应效果
            console.log('Edge单击', e);
        });
        graph.on('edge:dblclick', (e) => {
            const edge = e.item; //被点击的边元素
            const shape = e.target; //被点击的图形，可根据该信息作出不同响应，以达到局部响应效果
            console.log('Edge双击', e);
        });
        console.log(graph);
    }
</script>
</body>
</html>
