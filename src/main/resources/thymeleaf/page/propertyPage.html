<!DOCTYPE HTML>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{thymeleaf/util/begin::easyUI(title='Info Page')}"></head>
<body>
<div class="easyui-layout" data-options="fit:true">
    <div data-options="region:'north',border:true" style="height:300px;padding:5px;padding-left:15px;">
        <div th:if="${commandBean.primaryObj}" class="xui-toolbar">
            <div class="easyui-menubutton" data-options="plain:false" th:onclick="flame.loadActionMenu('[(${actionMenu})]','[(${commandBean.primaryOid})]',this);" th:text="#{action}"/>
            <img style="vertical-align:middle;padding-left:10px;" th:src="${commandBean.primaryObj?.icon}" th:if="${thingModel} != null"/>
            <span style="font-size:14px;vertical-align:middle;" th:text="${thingModel?.localDisplay}"></span>
            <span> - </span>
            <span style="font-size:14px;vertical-align:middle;font-weight:bold;" th:text="${commandBean.primaryObj?.name}"></span>
        </div>
        <div id="propertyDefinitionPanel"></div>
    </div>
    <div data-options="region:'center',border:false">
        <div th:id="|infoTabs_${randomUUID}|" class="easyui-tabs" data-options="fit:true,border:false" style="width:100%;">
            <div th:each="tabItem:${infoTabs}" th:title="${tabItem.Display}" th:data-options="|fit:true,href:'${tabItem.url}?oid=${commandBean.primaryOid}'|"></div>
        </div>
    </div>
</div>
<script type="text/javascript" th:inline="text">
    (($) => {
        flame.loadGrid('propertyDefinitionPanel', 'com.thing.form.XPropertyDefinitionForm', {
            queryParams: {
                oid: '[[${commandBean.primaryOid}]]'
            }
        });

        /** 用户点击某个Tab后，再次点击其他ThingModel，自动进入对应的Tab；*/
        $(function () {
            const _randomUUID = '[[${randomUUID}]]';
            const _selectedTab = $('#selectedTab');
            const _infoTabs = $('#infoTabs_' + _randomUUID);
            if (_infoTabs) {
                if (_selectedTab && _selectedTab.val()) {
                    _infoTabs.tabs("select", _selectedTab.val());
                }

                _infoTabs.tabs({
                    border: false,
                    onSelect: function (title, index) {
                        _selectedTab.attr("value", title);
                    }
                });
            }
        })
    })(jQuery);
</script>
</body>
</html>
