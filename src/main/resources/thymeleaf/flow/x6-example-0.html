<!DOCTYPE HTML>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{thymeleaf/util/begin::basic('Workflow', ~{::style}, ~{::script})}">
    <script src="javascript/axios/axios.min.js" th:href="@{/javascript/axios/axios.min.js}" type="text/javascript"></script>
    <script src="javascript/antv/x6.min.js" th:href="@{/javascript/antv/x6.min.js}" type="text/javascript"></script>

    <style type="text/css">
        #container {
            width: 100%;
            height: 600px;
            display: flex;
            border: 1px solid #dfe3e8;
        }

        #stencil {
            width: 180px;
            height: 100%;
            position: relative;
            border-right: 1px solid #dfe3e8;
        }

        #graph-container {
            width: calc(100% - 180px);
            height: 100%;
        }

        .x6-widget-stencil {
            background-color: #fff;
        }

        .x6-widget-stencil-title {
            background-color: #fff;
        }

        .x6-widget-stencil-group-title {
            background-color: #fff !important;
        }

        .x6-widget-transform {
            margin: -1px 0 0 -1px;
            padding: 0px;
            border: 1px solid #239edd;
        }

        .x6-widget-transform > div {
            border: 1px solid #239edd;
        }

        .x6-widget-transform > div:hover {
            background-color: #3dafe4;
        }

        .x6-widget-transform-active-handle {
            background-color: #3dafe4;
        }

        .x6-widget-transform-resize {
            border-radius: 0;
        }

        .x6-widget-selection-inner {
            border: 1px solid #239edd;
        }

        .x6-widget-selection-box {
            opacity: 0;
        }
    </style>
</head>
<body>
<div class="header">
    <button onclick="getJson()">点击</button>
</div>
<div id="container">
    <div id="stencil"></div>
    <div id="graph-container"></div>
</div>

<script type="text/javascript">
    var ports = {
        groups: {
            top: {
                position: 'top',
                attrs: {
                    circle: {
                        r: 4,
                        magnet: true,
                        stroke: '#5F95FF',
                        strokeWidth: 1,
                        fill: '#fff',
                        style: {
                            visibility: 'hidden',
                        },
                    },
                },
            },
            right: {
                position: 'right',
                attrs: {
                    circle: {
                        r: 4,
                        magnet: true,
                        stroke: '#5F95FF',
                        strokeWidth: 1,
                        fill: '#fff',
                        style: {
                            visibility: 'hidden',
                        },
                    },
                },
            },
            bottom: {
                position: 'bottom',
                attrs: {
                    circle: {
                        r: 4,
                        magnet: true,
                        stroke: '#5F95FF',
                        strokeWidth: 1,
                        fill: '#fff',
                        style: {
                            visibility: 'hidden',
                        },
                    },
                },
            },
            left: {
                position: 'left',
                attrs: {
                    circle: {
                        r: 4,
                        magnet: true,
                        stroke: '#5F95FF',
                        strokeWidth: 1,
                        fill: '#fff',
                        style: {
                            visibility: 'hidden',
                        },
                    },
                },
            },
        },
        items: [
            {
                group: 'top',
            }, {
                group: 'right',
            }, {
                group: 'bottom',
            }, {
                group: 'left',
            }
        ]
    };

    var imageShapes = [
        {
            label: 'Client',
            image:
                'https://gw.alipayobjects.com/zos/bmw-prod/687b6cb9-4b97-42a6-96d0-34b3099133ac.svg',
        }, {
            label: 'HTTP',
            image:
                'https://gw.alipayobjects.com/zos/bmw-prod/dc1ced06-417d-466f-927b-b4a4d3265791.svg',
        }, {
            label: 'API',
            image:
                'https://gw.alipayobjects.com/zos/bmw-prod/c55d7ae1-8d20-4585-bd8f-ca23653a4489.svg',
        }, {
            label: 'SQL',
            image:
                'https://gw.alipayobjects.com/zos/bmw-prod/6eb71764-18ed-4149-b868-53ad1542c405.svg',
        }, {
            label: 'Cloud',
            image:
                'https://gw.alipayobjects.com/zos/bmw-prod/c36fe7cb-dc24-4854-aeb5-88d8dc36d52e.svg',
        }, {
            label: 'MQ',
            image:
                'https://gw.alipayobjects.com/zos/bmw-prod/2010ac9f-40e7-49d4-8c4a-4fcf2f83033b.svg',
        }
    ];

    window.onload = function () {
        const graph = new X6.Graph({
            container: document.getElementById('graph-container'),
            resizing: false,
            rotating: false,
            snapline: true,
            keyboard: true,
            clipboard: true,
            grid: { //定义背景网格
                size: 10, visible: true
            },
            mousewheel: {
                enabled: true,
                zoomAtMousePosition: true,
                modifiers: 'ctrl',
                minScale: 0.5,
                maxScale: 3,
            },
            connecting: {
                anchor: 'center',
                connectionPoint: 'anchor',
                allowBlank: false,
                allowMulti: false,
                router: {
                    name: 'normal',
                    args: {
                        padding: 1,
                    },
                },
                connector: {
                    name: 'rounded',
                    args: {
                        radius: 8,
                    },
                },
                snap: {
                    radius: 20,
                },
                createEdge() {
                    return new X6.Shape.Edge({
                        attrs: {
                            line: {
                                stroke: '#A2B1C3',
                                strokeWidth: 2,
                                targetMarker: {
                                    name: 'block',
                                    width: 12,
                                    height: 8,
                                },
                            },
                        },
                        zIndex: 0,
                    })
                },
                validateConnection({targetMagnet}) {
                    return !!targetMagnet
                },
            },
            highlighting: {
                magnetAdsorbed: {
                    name: 'stroke',
                    args: {
                        attrs: {
                            fill: '#5F95FF',
                            stroke: '#5F95FF',
                        },
                    },
                },
            },
            selecting: {
                enabled: true,
                rubberband: true,
                showNodeSelectionBox: true,
            },
        })

        const stencil = new X6.Addon.Stencil({
            title: '流程图',
            target: graph,
            stencilGraphWidth: 200,
            stencilGraphHeight: 180,
            collapsable: false,
            groups: [
                {
                    title: '基础流程图',
                    name: 'basic',
                    collapsable: false,
                }, {
                    title: '系统设计图',
                    name: 'system',
                    collapsable: false,
                    graphHeight: 250,
                    layoutOptions: {
                        rowHeight: 70,
                    },
                },
            ],
            layoutOptions: {
                columns: 2,
                columnWidth: 80,
                rowHeight: 55,
            },
        })
        document.getElementById('stencil').appendChild(stencil.container)

        graph.bindKey(['meta+c', 'ctrl+c'], () => {
            const cells = graph.getSelectedCells()
            if (cells.length) {
                graph.copy(cells)
            }
            return false
        })
        graph.bindKey(['meta+x', 'ctrl+x'], () => {
            const cells = graph.getSelectedCells()
            if (cells.length) {
                graph.cut(cells)
            }
            return false
        })
        graph.bindKey(['meta+v', 'ctrl+v'], () => {
            if (!graph.isClipboardEmpty()) {
                const cells = graph.paste({offset: 32})
                graph.cleanSelection()
                graph.select(cells)
            }
            return false
        })

        //undo redo
        graph.bindKey(['meta+z', 'ctrl+z'], () => {
            if (graph.history.canUndo()) {
                graph.history.undo()
            }
            return false
        })
        graph.bindKey(['meta+shift+z', 'ctrl+shift+z'], () => {
            if (graph.history.canRedo()) {
                graph.history.redo()
            }
            return false
        })

        // select all
        graph.bindKey(['meta+a', 'ctrl+a'], () => {
            const nodes = graph.getNodes()
            if (nodes) {
                graph.select(nodes)
            }
        })

        //delete
        graph.bindKey('backspace', () => {
            const cells = graph.getSelectedCells()
            if (cells.length) {
                graph.removeCells(cells)
            }
        })

        // zoom
        graph.bindKey(['ctrl+1', 'meta+1'], () => {
            const zoom = graph.zoom()
            if (zoom < 1.5) {
                graph.zoom(0.1)
            }
        })
        graph.bindKey(['ctrl+2', 'meta+2'], () => {
            const zoom = graph.zoom()
            if (zoom > 0.5) {
                graph.zoom(-0.1)
            }
        })

        // 控制连接桩显示/隐藏
        const showPorts = (ports, show) => {
            for (let i = 0, len = ports.length; i < len; i = i + 1) {
                ports[i].style.visibility = show ? 'visible' : 'hidden'
            }
        }
        graph.on('node:mouseenter', () => {
            const container = document.getElementById('graph-container')
            const ports = container.querySelectorAll('.x6-port-body')
            showPorts(ports, true)
        })
        graph.on('node:mouseleave', () => {
            const container = document.getElementById('graph-container')
            const ports = container.querySelectorAll('.x6-port-body')
            showPorts(ports, false)
        });

        X6.Graph.registerNode('x-rect', {
            inherit: 'rect',
            width: 66,
            height: 36,
            attrs: {
                body: {
                    strokeWidth: 1,
                    stroke: '#5F95FF',
                    fill: '#EFF4FF',
                },
                text: {
                    fontSize: 12,
                    fill: '#262626',
                },
            },
            ports: {...ports},
        }, true);
        X6.Graph.registerNode('x-polygon', {
            inherit: 'polygon',
            width: 66,
            height: 36,
            attrs: {
                body: {
                    strokeWidth: 1,
                    stroke: '#5F95FF',
                    fill: '#EFF4FF',
                },
                text: {
                    fontSize: 12,
                    fill: '#262626',
                },
            },
            ports: {
                ...ports,
                items: [
                    {
                        group: 'top',
                    },
                    {
                        group: 'bottom',
                    },
                ],
            },
        }, true);
        X6.Graph.registerNode('x-circle', {
            inherit: 'circle',
            width: 45,
            height: 45,
            attrs: {
                body: {
                    strokeWidth: 1,
                    stroke: '#5F95FF',
                    fill: '#EFF4FF',
                },
                text: {
                    fontSize: 12,
                    fill: '#262626',
                },
            },
            ports: {...ports},
        }, true);
        X6.Graph.registerNode('x-image', {
            inherit: 'rect',
            width: 52,
            height: 52,
            markup: [
                {
                    tagName: 'rect',
                    selector: 'body',
                },
                {
                    tagName: 'image',
                },
                {
                    tagName: 'text',
                    selector: 'label',
                },
            ],
            attrs: {
                body: {
                    stroke: '#5F95FF',
                    fill: '#5F95FF',
                },
                image: {
                    width: 26,
                    height: 26,
                    refX: 13,
                    refY: 16,
                },
                label: {
                    refX: 3,
                    refY: 2,
                    textAnchor: 'left',
                    textVerticalAnchor: 'top',
                    fontSize: 12,
                    fill: '#fff',
                },
            },
            ports: {...ports},
        }, true);

        const r1 = graph.createNode({
            shape: 'x-rect',
            label: '开始',
            attrs: {
                body: {
                    rx: 20,
                    ry: 26,
                },
            },
        })
        const r2 = graph.createNode({
            shape: 'x-rect',
            label: '过程',
        })
        const r3 = graph.createNode({
            shape: 'x-rect',
            attrs: {
                body: {
                    rx: 6,
                    ry: 6,
                },
            },
            label: '可选过程',
        });
        const r4 = graph.createNode({
            shape: 'x-polygon',
            attrs: {
                body: {
                    refPoints: '0,10 10,0 20,10 10,20',
                },
            },
            label: '决策',
        });
        const r5 = graph.createNode({
            shape: 'x-polygon',
            attrs: {
                body: {
                    refPoints: '10,0 40,0 30,20 0,20',
                },
            },
            label: '数据',
        });
        const r6 = graph.createNode({
            shape: 'x-circle',
            label: '连接',
        });
        stencil.load([r1, r2, r3, r4, r5, r6], 'basic');

        const imageNodes = imageShapes.map((item) =>
            graph.createNode({
                shape: 'x-image',
                label: item.label,
                attrs: {
                    image: {
                        'xlink:href': item.image,
                    },
                },
            }),
        );
        stencil.load(imageNodes, 'system');

        function getJson() {
            const json = graph.toJSON();
            console.log(json);
        }
    };
</script>
</body>
</html>
