<!DOCTYPE HTML>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <script src="javascript/antv/x6.min.js" th:href="@{/javascript/antv/x6.min.js}" type="text/javascript"></script>
    <script src="javascript/flame/flow.xui.js" th:href="@{/javascript/flame/flow.xui.js}" type="text/javascript"></script>
</head>
<body th:insert="~{thymeleaf/util/popup::default(title='Edit Workflow', section=~{::section}, script=~{::script}, before='beforeXFlowJSON')}">
<section class="easyui-layout" data-options="fit:true">
    <div data-options="region:'north',border:true" style="height:32px;padding-left:5px;display:flex;align-items:center;">
        <div class="xui-flow">
            <input type="hidden" id="definitions" name="definitions" value="[]"/>
            <table>
                <tr>
                    <td><label><b th:text="#{label_flow_template_name}"></b></label></td>
                    <td><input class="easyui-textbox" id="name" name="name" th:value="${commandBean?.rowObject?.name?:''}"
                               th:data-options="|buttonText:'#{setting}',buttonIcon:'icon-smartart'|" style="width:300px;height:24px;"></td>
                    <td style="width:10px;"></td>
                    <td>
                        <button type="button" onclick="javascript:beforeXFlowJSON();"><img src="images/save.gif"></button>
                    </td>
                </tr>
            </table>
        </div>
    </div>
    <div data-options="region:'center',split:true,border:false">
        <div class="easyui-layout" data-options="fit:true">
            <div data-options="region:'west',border:true" style="width:82px;">
                <div id="xflow.stencil" style="width:80px;height:100%;position:relative;border-right:1px solid #DFE3E8;"></div>
            </div>
            <div data-options="region:'center',border:true" id="xflow.container"></div>
        </div>
    </div>
</section>
<script type="text/javascript" th:inline="text">
    var xflowEditor;
    (($) => {
        const dom_stencil = document.getElementById('xflow.stencil');
        const dom_graph = document.getElementById('xflow.container');
        xflowEditor = new flow.FlowEditor(dom_stencil, dom_graph, {
            editModel: true,
            readOnly: false,
        });
        /**
         * Workflow工作区中, 自动添加Start、End节点, 并且Start、End节点不能删除
         */
        axios.get('XUI$/get/xw.flow.processor.GetXFlowDefinitionProcessor', {
            params: {
                oid: '[[${commandBean.rowId?:""}]]'
            }
        }).then(function (response) {
            const result = response.data;
            if ('SUCCESS' == result.status) {
                xflowEditor.loadFlowEditor({
                    nodes: result.data.nodes,
                    edges: result.data.edges
                });
                /** loadFlowEditor()无法将自定义的属性xtype加载进X6.Graph中, 需要单独进行自定义属性的赋值 */
                for (let i = 0, len = result.data.nodes.length; i < len; i = i + 1) {
                    const tmp = result.data.nodes[i];
                    const node = xflowEditor.graph.model.collection.get(tmp.id);
                    if (node) node.xtype = tmp.xtype;
                }
            }
        }).catch(function (error) { // 请求失败处理
            console.log(error);
        });
    })(jQuery);

    function beforeXFlowJSON() {

        $('#definitions').val(JSON.stringify(xflowEditor.genXFlowJson()));
        return true;
    }
</script>
</body>
</html>
