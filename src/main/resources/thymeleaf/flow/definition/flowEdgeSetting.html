<!DOCTYPE HTML>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
</head>
<body th:insert="~{thymeleaf/util/popup::basic(section=~{::section}, script=~{::script}, before='saveEdgeRoute')}">
<section class="easyui-tabs" data-options="fit:true">
    <div title="路由" style="padding:2px">
        <div id="edgeRouteList" class="easyui-datalist" data-options="fit:true,checkbox:true,singleSelect:false,selectOnCheck:true,checkOnSelect:true,idField:'value',textField:'value'"></div>
    </div>
</section>
<script type="text/javascript">
    var edgeRoutes = [];
    var flowEdgeId = "[[${commandBean.getTextParameter('nodeId')}]]";
    (($) => {
        const flowEdge = flowEditor.getXFlowEdge(flowEdgeId);
        const currRoutes = flowEdge.getProp('routes');
        const routeArray = currRoutes ? currRoutes.replace(/^\?/, '').split(',') : [];
        const routeEvents = flowEdge.getSourceCell().getProp('routeEvents');
        if (routeEvents) {
            for (let item of routeEvents) {
                if (item.type == 'route') {
                    edgeRoutes.push({value: item.value, checked: routeArray.includes(item.value)});
                }
            }
        }

        $.parser.onComplete = function () {
            $('#edgeRouteList').datalist('loadData', { rows: edgeRoutes, total: edgeRoutes.length });
            for (let i = 0; i < edgeRoutes.length; i++) {
                if (edgeRoutes[i].checked) {
                    $('#edgeRouteList').datalist('checkRow', i);
                }
            }
        };
    })(jQuery);

    function saveEdgeRoute() {
        const selections = $('#edgeRouteList').datalist('getChecked');
        let routes = '?';
        for (let item of selections) {
            if (routes === '?') {
                routes = item.value;
            } else {
                routes = routes + ',' + item.value;
            }
        }
        flowEditor.modifyEdgeLabel(flowEdgeId, routes);

        return true;
    }
</script>
</body>
</html>
