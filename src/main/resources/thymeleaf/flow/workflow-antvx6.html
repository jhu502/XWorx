<!DOCTYPE HTML>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{thymeleaf/util/begin::basic('Workflow', ~{}, ~{::script})}">
    <script src="javascript/axios/axios.min.js" th:href="@{/javascript/axios/axios.min.js}" type="text/javascript"></script>
    <script src="javascript/antv/x6.min.js" th:href="@{/javascript/antv/x6.min.js}" type="text/javascript"></script>
</head>
<body>
<div id="container" style="height:98vh"></div>
<script type="text/javascript">
    var data = {
        nodes: [
            {
                id: 'start',
                shape: 'image',
                imageUrl: 'images/flow/startproc.gif',
                x: 40,
                y: 40,
                width: 18,
                height: 18,
                label: '开始',
                attrs: {
                    label: {
                        refX: 0.5,
                        refY: '100%',
                        fontSize: 11,
                        textAnchor: 'middle',
                        textVerticalAnchor: 'top'
                    }
                }
            },
            {
                id: 'activity',
                shape: 'image',
                imageUrl: 'images/flow/activity.gif',
                x: 160,
                y: 40,
                width: 18,
                height: 18,
                label: '活动',
                attrs: {
                    label: {
                        refX: 0.5,
                        refY: '100%',
                        fontSize: 11,
                        textAnchor: 'middle',
                        textVerticalAnchor: 'top'
                    }
                }
            },
            {
                id: 'activity0',
                shape: 'image',
                imageUrl: 'images/flow/activity.gif',
                x: 260,
                y: 40,
                width: 18,
                height: 18,
                label: '活动0',
                attrs: {
                    label: {
                        refX: 0.5,
                        refY: '100%',
                        fontSize: 11,
                        textAnchor: 'middle',
                        textVerticalAnchor: 'top'
                    }
                }
            },
            {
                id: 'end',
                shape: 'image',
                imageUrl: 'images/flow/endproc.gif',
                x: 160,
                y: 180,
                width: 18,
                height: 18,
                label: 'end',
                attrs: {
                    label: {
                        refX: 0.5,
                        refY: '100%',
                        fontSize: 11,
                        textAnchor: 'middle',
                        textVerticalAnchor: 'top'
                    }
                }
            }
        ],
        edges: [
            {
                source: 'start',
                target: 'activity',
                label: '通过',
                attrs: {
                    line: {
                        stroke: '#000',
                        strokeWidth: 1,
                        targetMarker: {
                            size: 8,
                            name: 'classic',
                        }
                    },
                    text: {
                        fontSize: 10,
                    }
                }
            },
            {
                source: 'activity',
                target: 'end',
                attrs: {
                    line: {
                        stroke: '#000',
                        strokeWidth: 1,
                        targetMarker: {
                            size: 8,
                            name: 'classic',
                        }
                    },
                    text: {
                        fontSize: 10,
                    }
                }
            },
        ],
    };
    window.onload = function () {
        const graph = new X6.Graph({
            container: document.getElementById('container'),
            width: 800,
            height: 600,
            grid: true,
        }).on('edge:mouseenter', ({cell}) => {
            cell.addTools([{
                name: 'target-arrowhead',
                args: {
                    attrs: {
                        fill: 'blue',
                    },
                },
            }])
        }).on('edge:mouseleave', ({cell}) => {
            cell.removeTools()
        }).fromJSON(data);
        console.log(graph);
    }
</script>
</body>
</html>
