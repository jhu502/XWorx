<!DOCTYPE HTML>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{thymeleaf/util/begin::easyUI(title='ThingModel', link=~{::link}, script=~{::script}, style=~{::style})}">
	<!-- 0下面的javascript/css是代码编辑器所需要引入0 -->
	<link href="javascript/codemirror/lib/codemirror.css" rel="stylesheet"/>
	<link href="javascript/codemirror/theme/eclipse-ext.css" rel="stylesheet"/>
	<link href="javascript/codemirror/addon/hint/show-hint.css" rel="stylesheet"/>
	<script src="javascript/codemirror/lib/codemirror.js" type="text/javascript"></script>
	<script src="javascript/codemirror/mode/xml/xml.js" type="text/javascript"></script>
	<script src="javascript/codemirror/mode/javascript/javascript.js" type="text/javascript"></script>
	<script src="javascript/codemirror/addon/hint/show-hint.js" type="text/javascript"></script>
	<script src="javascript/codemirror/addon/hint/javascript-hint.js" type="text/javascript"></script>
	<script src="javascript/codemirror/addon/fold/foldcode.js" type="text/javascript"></script>
	<script src="javascript/codemirror/addon/fold/foldgutter.js" type="text/javascript"></script>
	<style>
		.CodeMirror {
			/*border: 1px solid black;*/
			font-family: Consolas, Courier, arial, sans-serif, Segoe UI, tahoma;
			font-size: 12px;
		}
	</style>
</head>
<body>
<div class="easyui-layout" data-options="fit:true">
	<div data-options="region:'west',split:true,border:false" style="width:300px;">
		<table id="thingmodel_tree"></table>
		<script type="text/javascript">
			flame.loadGrid("thingmodel_tree", "com.thing.builder.ThingModelTreeBuilder", {
				onClickRow: function (node) {
					$('#selectedOid')[0].value = node.oid;
					$('#tmodelInfo').panel({
						href: 'XUI$/info/InfoPage?oid=' + node.oid
					});
					$.parser.parse('#tmodelInfo');
				}
			});
		</script>
	</div>
	<div data-options="region:'center',border:false" style="border: 0px;" th:with="mOid=${T(com.flame.thing.ThingModelHelper).manager().getThingModel('com.thing.entity.XThingModel').getOid()}">
		<input id="selectedOid" type="hidden" value=""/>
		<!-- 0.记录用户当前的Tab，点击其他ThingModel时默认进入该Tab -->
		<input id="selectedTab" type="hidden" value="Details">
		<div id="tmodelInfo" class="easyui-panel" th:data-options="|fit:true,border:false,href:'${'XUI$/info/InfoPage?oid='+mOid}'|"></div>
	</div>
</div>
</body>
</html>
