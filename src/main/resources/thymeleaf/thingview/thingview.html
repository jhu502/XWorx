	function load3dModelStruct(uri, cad3d) {
		if (!cad3d || !uri)
			return;

		const p = xworxview.loadStructureNode(uri, cad3d, [0, 0,0]);
		
		if (!cad3d.rows)
			return;
		
		for (var i in cad3d.rows) {
			load3dModelStruct(uri, cad3d.rows[i], p);
		}
	};
