<!DOCTYPE HTML>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">

<form id="xwxPopupWindow_Form" class="easyui-form" method="post" th:action="|XUI$/form/${commandBean.processor}|" th:enctype="${enctype}" th:fragment="default()" style="height:100%;width:100%;">
	<input type="hidden" name="openerSelected" th:value="${commandBean.rowIdsJoint}" />
	<input type="hidden" name="primaryOid" th:value="${commandBean.primaryOid}" />
	<div class="easyui-layout" data-options="fit:true">
		<div data-options="region:'center'" style="padding:0px;border:0px;">
			<th:block th:if="${section!=null}">
				<th:block th:replace="${section}"/>
			</th:block>
		</div>
		<div data-options="region:'south'" style="height: 35px; padding-right: 10px; background-color: #f5f5f5">
			<div style="text-align: right; padding: 4px 0">
				<a href="javascript:void(0)" class="easyui-linkbutton" onclick="flame.closeWindow(this)" style="width:80px" th:text="#{cancel}" />
				<a href="javascript:void(0)" class="easyui-linkbutton" style="width:80px" th:text="#{done}"
				   th:onclick="flame.submitForm(this,'[(${commandBean.processor})]',[(${#strings.isEmpty(callback)}?undefined:${callback})],[(${#strings.isEmpty(before)}?undefined:${before})])" />
			</div>
		</div>
	</div>
	<th:block th:if="${style}">
		<th:block th:replace="${style}" />
	</th:block>
	<th:block th:if="${link}">
		<th:block th:replace="${link}" />
	</th:block>
	<th:block th:if="${script!=null}">
		<th:block th:replace="${script}"/>
	</th:block>
</form>
