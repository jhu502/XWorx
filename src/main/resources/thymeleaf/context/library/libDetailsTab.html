<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<script src="javascript/flame/flame.view.js"></script>
<div class="easyui-layout" data-options="fit:true">
    <div data-options="region:'north',border:false" style="height:240px">
        <fieldset class="xui-fieldset">
            <legend style="font-family:Arial, Helvetica Neue, Helvetica, sans-serif; font-size: 12px; margin-bottom: 5px;">[[#{visualization_attributes}]]</legend>
            <div id="Thumbnail3DDiv" class="thumbnail">
                <!-- img style="width: 100%; height: 100%;" src="images/product_288.png" -->
            </div>
            <table style="table-layout: fixed;">
                <tr>
                    <th></th>
                    <th></th>
                    <th style="width:20px;"></th>
                    <th></th>
                    <th></th>
                </tr>
                <tr>
                    <td><label>[[#{label_number}]]</label></td>
                    <td id="number"><span th:text="${commandBean.primaryObj.number}"></span></td>
                    <td></td>
                    <td><label>[[#{label_name}]]</label></td>
                    <td id="name"><span th:text="${commandBean.primaryObj.name}"></span></td>
                </tr>
                <tr>
                    <td><label>[[#{label_libraryType}]]</label></td>
                    <td id="libraryType"><span th:text="${commandBean.primaryObj.libraryType.name}"></span></td>
                </tr>
                <tr>
                    <td><label>[[#{label_createdStamp}]]</label></td>
                    <td id="createdStamp"><span th:text="${commandBean.primaryObj.createdStamp}"></span></td>
                    <td></td>
                    <td><label>[[#{label_modifiedStamp}]]</label></td>
                    <td id="modifiedStamp"><span th:text="${commandBean.primaryObj.modifiedStamp}"></span></td>
                </tr>
                <tr>
                    <td><label>[[#{label_description}]]</label></td>
                    <td id="description"><span th:text="${commandBean.primaryObj.description}"></span></td>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
            </table>
        </fieldset>
    </div>
    <div class="easyui-panel" data-options="region:'center',border:false" style="padding: 2px"></div>
</div>
<script type="text/javascript" th:inline="text">
    (($) => {
        $('#Thumbnail3DDiv').append('<img src="images/product_288.png">');
    })(jQuery);
</script>
</body>
</html>
