spring.profiles.include=common
spring.application.name=Zookeeper
#设置SpringBoot运行模式为NONE模式：此模式下SpringBoot会在执行完成后自动退出
spring.main.web-application-type=none
spring.banner.location=classpath:/banner/banner-blank.txt
# 指定默认的slf4j配置文件
logging.config=${xworx.home}/codebase/config/logback/logback-zookeeper.xml
spring.freemarker.enabled=false
spring.freemarker.checkTemplateLocation=false
serverId=1
# 默认值为yes:配置zookeeper在事务提交的时候，将日志写入操作强制刷新磁盘, no:可提高zookeeper写性能
forceSync=no
# The number of milliseconds of each tick
tickTime=2000
# the port at which the clients will connect
clientPort=2181
# The number of ticks that the initial 
# synchronization phase can take
initLimit=10
# The number of ticks that can pass between 
# sending a request and getting an acknowledgement
syncLimit=5
# the directory where the snapshot is stored.
# do not use /tmp for storage, /tmp here is just 
# example sakes.
dataDir=${xworx.home}/storage/zookeeper/data
dataLogDir=${xworx.home}/storage/zookeeper/logs
# ZooKeeper 审计日志
audit.enable=true
auditlog.logdir=${xworx.home}/storage/zookeeper/logs
# the maximum number of client connections.
# increase this if you need to handle more clients
# 分别默认值是2倍和20倍，这两个参数用于服务端对客户端会话的超时时间进行限制
minSessionTimeout=4000
# 增加最大 session timeout 至 5 分钟，防止长时间 AI 任务导致 session 超时
# 默认值是 tickTime * 20 = 40000ms，不足以应对长时间阻塞场景
maxSessionTimeout=400000
#maxClientCnxns=60
admin.serverPort=8180
# Be sure to read the maintenance section of the 
# administrator guide before turning on autopurge.
#
# http://zookeeper.apache.org/doc/current/zookeeperAdmin.html#sc_maintenance
#
# The number of snapshots to retain in dataDir
#autopurge.snapRetainCount=3
# Purge task interval in hours
# Set to "0" to disable auto purge feature
#autopurge.purgeInterval=1
## Metrics Providers
#
# https://prometheus.io Metrics Exporter
#metricsProvider.className=org.apache.zookeeper.metrics.prometheus.PrometheusMetricsProvider
#metricsProvider.httpPort=7000
#metricsProvider.exportJvmInfo=true
#server.1=127.0.0.1:2281:2381
#server.2=127.0.0.1:2282:2382
#server.3=127.0.0.1:2283:2383

#配置arthas.server.ssl=true，arthas.tunnel-server就必须设置wss
arthas.tunnel-server=ws://${arthas.server.host}:${arthas.server.port}/ws
#客户端id,应用名@随机值，tunnel server会截取分隔符@前面的字符串作为应用名: Zookeeper@2181
arthas.agent-id=${spring.application.name}@${clientPort}
