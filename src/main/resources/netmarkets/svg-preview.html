<title>SVG 图标预览</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
  .header { position: sticky; top: 0; z-index: 10; background: #fff; padding: 16px 24px; border-bottom: 1px solid #ddd; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .header h1 { font-size: 18px; white-space: nowrap; }
  .header input { flex: 1; min-width: 200px; padding: 6px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
  .header .count { color: #888; font-size: 13px; white-space: nowrap; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; padding: 16px; }
  .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; display: flex; flex-direction: column; align-items: center; padding: 12px 6px 8px; cursor: pointer; transition: border-color .15s; }
  .card:hover { border-color: #1a73e8; }
  .card.hidden { display: none; }
  .card img { width: 32px; height: 32px; }
  .card .name { margin-top: 6px; font-size: 11px; color: #555; text-align: center; word-break: break-all; line-height: 1.3; }
  .copied { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 8px 20px; border-radius: 6px; font-size: 13px; opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 100; }
  .copied.show { opacity: 1; }
</style>
</head>

  <h1>SVG 图标预览</h1>

  var grid = document.getElementById('grid');
  var filter = document.getElementById('filter');
  var count = document.getElementById('count');
  var copied = document.getElementById('copied');

  function render(list) {
    grid.innerHTML = '';
    count.textContent = list.length + ' 个';
    list.forEach(function(f) {
      var card = document.createElement('div');
      card.className = 'card';
      card.setAttribute('data-name', f);
      card.title = f;
      card.onclick = function() {
        navigator.clipboard.writeText(f).then(function() {
          copied.className = 'copied show';
          setTimeout(function() { copied.className = 'copied'; }, 1200);
        });
      };
      var img = document.createElement('img');
      img.src = '../images/svg/' + f;
      img.alt = f;
      img.loading = 'lazy';
      var span = document.createElement('span');
      span.className = 'name';
      span.textContent = f.replace('.svg', '');
      card.appendChild(img);
      card.appendChild(span);
      grid.appendChild(card);
    });
  }

  filter.addEventListener('input', function() {
    var q = filter.value.toLowerCase();
    var filtered = q ? FILES.filter(function(f) { return f.toLowerCase().indexOf(q) !== -1; }) : FILES;
    render(filtered);
  });

  render(FILES);
</script>
